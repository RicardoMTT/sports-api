# .github/workflows/ci-cd.yml
name: Sports API — CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # ── JOB 1: CI — Compilar y testear ──────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar
        run: mvn clean compile -q

      - name: Ejecutar tests
        run: mvn test

      - name: Publicar reporte de tests
        if: always()   # ejecutar aunque fallen los tests
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── JOB 2: CD — Solo si CI pasó y es push a main ───
  deploy:
    needs: build-and-test          # espera que el job anterior termine bien
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generar JAR
        run: mvn clean package -DskipTests

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: tuusuario/sports-api:latest

      - name: Desplegar en servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull tuusuario/sports-api:latest
            docker stop sports-api || true
            docker rm sports-api || true
            docker run -d \
              --name sports-api \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASS }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              tuusuario/sports-api:latest