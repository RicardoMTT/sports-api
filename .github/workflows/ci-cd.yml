# .github/workflows/ci-cd.yml
name: Sports API — CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

#El PR (El Examen de Admisión): El código está "en cuarentena". Se ejecuta solo el CI (build-and-test).
#Si reprueba , se bloquea el paso. Si aprueba, el botón de Merge se enciende.
#El Merge (La Aprobación Humana): Un compañero revisa tu código, confía en la luz verde que le dio
#GitHub Actions y aprueba la fusión.
#El Push a Master (La Entrega Automática): Para Git, ese merge es un push a la rama principal.
# El pipeline se dispara desde cero: vuelve a pasar el CI (para garantizar que la mezcla final no rompió
#nada) y, como ahora sí cumple la condición de tu if, activa el CD (deploy) para subir la imagen a Docker Hub y mandar el Webhook a Render.
#
jobs:

  # ── JOB 1: CI — Compilar y testear ──────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    # SQL Server corre como contenedor Docker junto al runner
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Indiegente123$
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Indiegente123$' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Configurar Java 17, el action setup-java lo que hace es descargar Java 17 y configurar el entorno
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Crear base de datos SportsStoreDB
      - name: Crear base de datos SportsStoreDB
        run: |
          # Esperamos un momento a que el servicio esté listo internamente
          sleep 20
          docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Indiegente123$' \
            -Q "CREATE DATABASE SportsStoreDB" \
            -No

      # Compilar el proyecto, compilar se refiere a la compilación de código fuente que genera un archivo .jar
      - name: Compilar
        run: mvn clean compile -q

      # Ejecutar tests, mvn test ejecuta los tests unitarios del proyecto
      - name: Ejecutar tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1433;databaseName=SportsStoreDB;encrypt=false
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: Indiegente123$

      # Publicar reporte de tests, siempre se ejecuta, si hay un error en el test, el workflow no se detendrá
      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── JOB 2: CD — Solo si CI pasó y es push a master ──────────
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generar JAR
        run: mvn clean package -DskipTests

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sports-api:latest

      # Step creado para desplegar en Render
      - name: Desplegar en Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
