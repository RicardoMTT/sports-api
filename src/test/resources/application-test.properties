# Propiedades usadas SOLO durante los tests en CI
# Sobreescribe application.properties cuando el perfil "test" está activo

# Conexión sin SSL — el contenedor Docker de CI no tiene certificado válido
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SportsStoreDB;encrypt=false;trustServerCertificate=true;

# Crear y destruir el esquema en cada ejecución de tests
# (no queremos create-drop en producción pero sí en CI)
spring.jpa.hibernate.ddl-auto=create-drop

# Menos verbosidad en tests
spring.jpa.show-sql=false
logging.level.org.hibernate.orm.jdbc.bind=WARN
