# Properties para tests de capa web (@WebMvcTest)
# No necesita BD ni configuración real de JWT

# Evitar que Spring intente conectar a BD durante @WebMvcTest
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# JWT — valores dummy para que el contexto arranque sin error de @Value
security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
security.jwt.expiration-time=900000
security.jwt.refresh-expiration-time=604800000
