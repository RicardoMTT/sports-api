spring.application.name=music-api

# En Render, PORT=8080 se inyecta automáticamente como variable de entorno.
# Localmente no existe esa variable, así que cae al default 8081.
server.port=${PORT:8081}
server.servlet.context-path=/
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=SportsStoreDB;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Indiegente123$}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=MusicApiHikariPool
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.orm.jdbc.bind=TRACE

security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
security.jwt.expiration-time=900000
security.jwt.refresh-expiration-time=604800000

# Expone solo health e info (no metricas sensibles en produccion)
management.endpoints.web.exposure.include=health,info,metrics,env
# Muestra detalles del health solo cuando se está autenticado como ADMIN
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
# Prefijo de los endpoints de Actuator
management.endpoints.web.base-path=/actuator
# Información de la app expuesta en /actuator/info
info.app.name=Soundstore API
info.app.version=1.0.0
info.app.description=API REST para la tienda de música Soundstore
